<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
   <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <style>
   :root {
        --brand-red: #e50914;
        --bg-dark: #141414;
        --control-bg: #252a34;
        --icon-color: #8a96a3;
        --highlight-blue: #ff4d4d;

    --bg-black: #0F0F0F;
    --surface-grey: #1A1A1A;
    --text-white: #FFFFFF;
    --text-muted: #A0A0A0;
    --input-bg: #141414;
    }

    body {
        background-color: #1a1a1a;
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        color: white;
    }

    /* --- Navbar Styling --- */
    .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 5%;
        
    }

    .browse-btn {
        display: flex;
        align-items: center;
        background-color: var(--brand-red);
        color: white;
        text-decoration: none;
        padding: 8px 20px;
        border-radius: 50px;
        font-weight: 600;
        font-size: 14px;
        gap: 8px;
    }

    .nav-logo {
        height: 40px;
        width: auto;
    }

    .nav-right {
        display: flex;
        align-items: center;
        gap: 20px;
    }

    .icon-btn {
        background: none;
        border: none;
        color: white;
        font-size: 1.2rem;
        cursor: pointer;
    }

    .profile-icon {
        width: 35px;
        height: 35px;
        background: linear-gradient(to bottom, #ff4d4d, #b30000);
        border-radius: 6px;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* --- Video Player Styling --- */
    .video-card {
        width: 90%;
        max-width: 800px; /* Standard Desktop Size */
        margin: 40px auto;
        background-color: var(--control-bg);
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 15px 35px rgba(0,0,0,0.6);
    }

    .video-container {
        position: relative;
        width: 100%;
        /* Standard Movie Aspect Ratio (16:9) */
        aspect-ratio: 16 / 9; 
        background-color: black;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    video {
        width: 100%;
        height: 100%;
        object-fit: cover; /* Ensures video fills the fixed area without gaps */
    }

    .play-overlay {
        position: absolute;
        z-index: 2;
        cursor: pointer;
    }

    .play-circle {
        width: 70px;
        height: 70px;
        background: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .play-circle i {
        color: white;
        font-size: 1.8rem;
        padding-left: 5px;
    }

    /* --- Control Bar --- */
    .controls-bar {
        display: flex;
        justify-content: space-between;
        padding: 20px 30px;
    }

    .left-controls, .right-controls {
        display: flex;
        gap: 25px;
    }

    .controls-bar i {
        color: var(--icon-color);
        font-size: 1.3rem;
        cursor: pointer;
    }

   

    /* Responsive Adjustments */
    @media (max-width: 600px) {
        .controls-bar { padding: 15px; gap: 15px; }
        .play-circle { width: 50px; height: 50px; }
        .browse-btn span { display: none; } /* Hide text on mobile */
    }
   #title{
       position: relative;
       margin-left: 30px;
       margin-top: 20px;
   }
    #player{
       width: 100%;
       height: 100%;
       border: none;
   }
   i:hover{
       color: #ff4d4d;
   }
   .server-section {
    text-align: center;
    margin: 30px auto;
    color: #e0e0e0;
    max-width: 500px;
}

.server-hint {
    font-size: 14px;
    margin-bottom: 20px;
    font-weight: 300;
    opacity: 0.9;
}

/* Container for the buttons */
.server-switcher {
    display: inline-flex;
    background-color: #555; /* Dark grey side */
    border-radius: 50px;
    overflow: hidden;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

.server-btn {
    border: none;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 30px;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s ease;
    background-color: transparent;
    color: white;
}

/* Make sure your CSS matches the attribute being set */
[data-server="active"] {
    background-color: white;
    color: #333;
}

/* Blue Cloud Icon for active state */
[data-server="active"] i {
    color: #ff4d4d;
}

/* Inactive Cloud Icon */
.server-btn i {
    font-size: 1.1rem;
}

.server-btn:active {
    background-color: #666;
}
#movieResult {
    position: absolute;
    background: #1a1a1a; /* Dark surface */
    border: 1px solid rgba(255, 255, 255, 0.1);
    width: 350px;
    max-height: 400px; /* Use max-height instead of fixed height */
    top: 110px;
    justify-self: center;
    border-radius: 16px;
    overflow-y: auto;
    overflow-x: hidden;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); /* Adds depth */
    z-index: 100;
    margin-top: 10px;
    display: none;
}

/* Individual Movie Row */
.movie-card {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px 16px;
    cursor: pointer;
    transition: background 0.2s ease;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
}

.movie-card:hover {
    background: rgba(255, 255, 255, 0.05); /* Subtle highlight */
}

/* Poster Image */
.movie-poster {
    width: 50px;
    height: 70px;
    border-radius: 8px;
    object-fit: cover; /* Ensures image isn't distorted */
    background: #333; /* Placeholder color while loading */
}

/* Text Container */
.movie-details {
    display: flex;
    flex-direction: column;
    justify-content: center;
}

/* Meta Info (Type & Year) */
.movie-meta {
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #888;
    font-size: 0.7rem;
    font-weight: 600;
    margin-bottom: 4px;
}

/* Movie Title */
.movie-title {
    color: #ffffff;
    font-size: 0.95rem;
    font-weight: 500;
    margin: 0;
    line-height: 1.3;
    /* Truncate long titles with ellipsis (...) */
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

/* Custom Scrollbar for a "Pro" look */
#movieResult::-webkit-scrollbar {
    width: 6px;
}
#movieResult::-webkit-scrollbar-thumb {
    background: #444;
    border-radius: 10px;
}
.search-container {
    background: var(--input-bg);
    border: 1px solid var(--text-muted);
    border-radius: 8px;
    padding: 12px 20px;
    display: flex;
    justify-self: center;
    justify-content: center;
    margin-bottom: 50px;
}

.search-container input {
    background: transparent;
    border: none;
    color: white;
    padding-left: 15px;
    width: 100%;
    font-size: 1rem;
}

.search-container input:focus { outline: none; }

.filter-btn {
    background: transparent;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 0.9rem;
    display: flex;
    align-items: center;
    gap: 8px;
}
#searchContainer{
    position: fixed;
    z-index: 999;
    border: 0px solid black;
    top: 20px;
    padding-top: 30px;
    width: 100%;
    
    display: none;
    justify-content:center;
    justify-self: center;
}
.info_movie-card {
  background-color: #1a232e;
  width: 85%;
  max-width: 450px;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  margin-left: 15px;
  margin-top: 20px;
  padding:  16px;
}

.header { padding: 20px 20px 10px; }

.info_h1 {
  color: #fff;
  margin: 0 0 10px 0;
  font-size: 1.8rem;
  font-weight: 500;
}

.badges { display: flex; gap: 8px; }

.badge {
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 0.85rem;
  font-weight: bold;
  color: white;
  border: 1px solid #4a5568;
}

.imdb { background: #000; color: #f5c518; border-color: #f5c518; }
.fab.fa-imdb { margin-right: 4px; }

.description {
  padding: 0 20px;
  line-height: 1.6;
  font-size: 0.95rem;
  margin-bottom: 20px;
}

.divider {
  border: 0;
  border-top: 1px dotted #4a5568;
  margin: 0 20px;
}

.content-wrapper {
  display: flex;
  padding: 20px;
  gap: 15px;
}

.details { flex: 2; font-size: 0.9rem; }
.details p { margin: 6px 0; line-height: 1.4; }
.details span { color: #fff; }

.poster-container {
  flex: 1;
  background-color: #2d3748; /* Placeholder color */
  border-radius: 8px;
  height: 180px;
  overflow: hidden;
}

.poster-img { width: 100%; height: 100%; object-fit: cover; }

.rating-footer {
  background: linear-gradient(to right, #b30000, #ff4d4d);
  padding: 10px;
  font-size: 16px;
  text-align: center;
  color: #fff;
  border-radius: 5px;
}

.stars { font-size: 1.4rem; margin-bottom: 5px; }
.stars .yellow { color: #ecc94b; }
.stars .gray { color: #4a5568; }
.rating-text { font-size: 0.9rem; }
.section-title-liked {
    margin-top: 40px;
    font-size: 1.5rem;
    font-weight: 400;
    margin-bottom: 20px;

    text-align: center;
}
a{
    color: inherit;
    text-decoration: none;
}

/* The Scroll Container */
.scroll-wrapper {
    padding: 10px;
    display: flex;
    gap: 16px;
    overflow-x: auto;
    padding-bottom: 10px;

/* Hide scrollbar for Chrome, Safari and Opera */

/* Movie Card Style */

.img-container-liked {

    overflow: hidden;
}

.poster-liked {
    width: 100%;
    height: 100%;

.hd-badge {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(0, 0, 0, 0.5);

.movie-info-liked {

.meta-liked {

.loader, .loader_before {
  font-size: 40px;

  text-align: center;
  top: 200px;
  left: 50%;

  z-index: 999;
}

.loader,.loader_before i {
  animation: spin 1s linear infinite;
}

@keyframes spin {
  100% {
    transform: rotate(360deg);
  }
}
 #footer {
        width: 100%;
        background-color: #0F0F0F;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        padding: 60px 5% 30px 5%;
        margin-top: 50px; /* Provides breathing room from content above */
        box-sizing: border-box;
        color: var(--text-muted);
        font-size: 14px;
    }

    #request_info {
        display: flex;
        gap: 30px;
        justify-content: center;
        margin-bottom: 25px;
    }

    #request_info span {
        text-transform: uppercase;
        letter-spacing: 1.5px;
        font-weight: 600;
        cursor: pointer;
        transition: color 0.3s ease;
        color: var(--text-white);
    }

    #request_info span:hover {
        color: var(--brand-red);
    }

    #footer p {
        max-width: 600px;
        margin: 0 auto 40px auto;
        line-height: 1.8;
        opacity: 0.7;
    }

    #bottom {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 15px;
        padding-top: 30px;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    #bottom img {
        filter: grayscale(1); /* Matches professional muted look */
        opacity: 0.6;
        transition: 0.3s;
    }

    #bottom img:hover {
        filter: grayscale(0);
        opacity: 1;
    }

    #bottom span {
        font-size: 12px;
        color: #555;
    }
    /* Full page loader for fetching data */
#fetch-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #0f0f0f;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    transition: opacity 0.5s ease;
}

#fetch-overlay .spinner {
    width: 50px;
    height: 50px;
    border: 3px solid rgba(229, 9, 20, 0.2);
    border-top: 3px solid var(--brand-red);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-bottom: 20px;
}

/* Spinner specifically inside the video container */
.video-container .loader {
    position: absolute;
    z-index: 5;
    background: black;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
}
#remove_iframe{
    position: fixed;
    z-index: 9999;
    top: 10px;
    right: 10px;
    color: #8a96a3;
    font-size: 12px;
    display: none;
}
  </style>
</head>

<body>

<nav class="navbar">
    <div class="nav-left">
        <a href="#" class="browse-btn">
            <i class="fa-solid fa-play"></i>
            <b>Browse</b>
        </a>
    </div>

    <div class="nav-center">
        <img src="/IMG/logo_m.png" alt="Logo" class="nav-logo">
    </div>

    <div class="nav-right">
        <button class="icon-btn search-btn" id="search-b">
            <i class="fa-solid fa-magnifying-glass"></i>
        </button>
        <div class="profile-icon">
            <i class="fa-solid fa-face-smile"></i>
        </div>
    </div>
</nav>
<div id="searchContainer">
    <div class="search-container">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="Search movies" id="search">
           
        </div>
</div>
<div id="movieResult"></div>
<div class="loader_before"></div>
<script type="module">
 const loaders = document.querySelector(".loader_before")
    import { fetchmovie } from "/JS/fetchMovie.js";
    import { movie } from "/UI/searchBar.js";
    
    movie.search();
    await fetchmovie.fetchWorker();
   loaders.style.display="none"
    let bodyClickListener = null;

    document.querySelector("#search-b").addEventListener("click", (e) => {
        // --- KEY FIX START ---
        e.stopPropagation(); // Prevents the body listener from firing immediately
        // --- KEY FIX END ---

        const searchBody = document.getElementById("searchContainer");
        const displayBar = document.getElementById("movieResult");
        
        searchBody.style.display = "grid";
        displayBar.style.display = "block";
        
        if (bodyClickListener) {
            document.removeEventListener("click", bodyClickListener);
        }
        
        bodyClickListener = (event) => {
            const searchContainer = document.getElementById("searchContainer");
            const movieResult = document.getElementById("movieResult");
            const searchButton = document.querySelector("#search-b");
            
            // If the click is NOT inside the search box AND NOT inside the results AND NOT the button
            if (!searchContainer.contains(event.target) && 
                !movieResult.contains(event.target) && 
                !searchButton.contains(event.target)) {
                
                searchContainer.style.display = "none";
                movieResult.style.display = "none";
                
                document.removeEventListener("click", bodyClickListener);
                bodyClickListener = null;
            }
        };
        
        // Use document instead of document.body for better coverage
        document.addEventListener("click", bodyClickListener);
    });
</script>



</body>
