<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<script id="hlsSetup" src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
   <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
     <script src="https://cdn.jsdelivr.net/npm/localforage"></script>
  <style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
    --brand-red: #e50914;
    --bg-dark: #141414;
    --control-bg: #252a34;
    --icon-color: #8a96a3;
    --highlight-blue: #ff4d4d;
    --bg-black: #0F0F0F;
    --surface-grey: #1A1A1A;
    --text-white: #FFFFFF;
    --text-muted: #A0A0A0;
    --input-bg: #141414;
    --accent-gradient: linear-gradient(180deg, #ff4d4d 0%, #b30000 100%);

    /* Responsive scale tokens from index */
    --ctrl-icon-size: clamp(14px, 2.2vw, 22px);
    --ctrl-padding: clamp(5px, 1.2vw, 10px);
    --timestamp-size: clamp(10px, 1.5vw, 14px);
    --center-btn-size: clamp(44px, 8vw, 70px);
    --center-icon-size: clamp(18px, 3.5vw, 30px);
    --settings-width: clamp(220px, 50vw, 300px);
    --settings-bottom: clamp(55px, 9vh, 80px);
    --progress-margin-bottom: clamp(8px, 1.8vh, 16px);
    --controls-padding-h: clamp(8px, 3vw, 20px);
    --controls-padding-top: clamp(16px, 4vh, 32px);
    --controls-padding-bottom: clamp(10px, 2.5vh, 22px);
}

body {
    background-color: #1a1a1a;
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    color: white;
    touch-action: manipulation;
}

/* --- Navbar Styling --- */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 90%;
    max-width: 800px;
    margin: 10px auto;
    padding: 6px 12px;
    border-radius: 100px;
    transition: all 0.3s ease;
}

@media (min-width: 400px) {
    .navbar {
        background: var(--input-bg, rgba(255, 255, 255, 0.1));
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        margin-top: 20px;
    }
}

.browse-btn {
    display: flex;
    align-items: center;
    background: linear-gradient(180deg, #ff4d4d 0%, #b30000 100%);
    color: white;
    text-decoration: none;
    padding: 8px 20px;
    border-radius: 50px;
    font-weight: 600;
    font-size: 14px;
    gap: 8px;
}

.nav-logo {
    height: 40px;
    width: auto;
    backdrop-filter: blur(2px);
}

.nav-right {
    display: flex;
    align-items: center;
    gap: 20px;
}

.icon-btn {
    background: none;
    border: none;
    color: white;
    font-size: 1.2rem;
    cursor: pointer;
}

.profile-icon {
    width: 35px;
    height: 35px;
    background: linear-gradient(to bottom, #ff4d4d, #b30000);
    border-radius: 6px;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* ============================================ */
/* NEW VIDEO STREAM STYLES (from index 2)       */
/* ============================================ */

/* Full-screen video card override */
.video-card-stream {
    width: 100%;
    margin: 0 auto;
    background-color: #000;
    border-radius: 0;
    overflow: hidden;
    box-shadow: none;
}

.video-container-stream {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    background-color: black;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

.video-main-stream {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
}

/* Subtitles */
#subtitle-display-stream {
    position: absolute;
    bottom: clamp(10%, 13%, 15%);
    left: 50%;
    transform: translateX(-50%);
    width: clamp(80%, 85%, 90%);
    text-align: center;
    color: #ffffff;
    font-size: clamp(0.8rem, 2.5vw, 1.5rem);
    font-weight: 300;
    line-height: 1.4;
    text-shadow: 0px 0px 5px #000, 0px 0px 10px #000;
    pointer-events: none;
    z-index: 9;
    display: none;
    font-family: 'Inter', sans-serif;
}

/* Center play/pause overlay */
.center-overlay-stream {
    position: absolute;
    z-index: 10;
    background: rgba(0, 0, 0, 0.6);
    width: var(--center-btn-size);
    height: var(--center-btn-size);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: opacity 0.3s ease, transform 0.2s ease;
}

.center-overlay-stream:hover,
.center-overlay-stream:active {
    transform: scale(1.1);
    background: rgba(229, 9, 20, 0.8);
}

.center-overlay-stream i {
    font-size: var(--center-icon-size);
    color: white;
    margin-left: 3px;
}

/* Controls bar */
.controls-wrapper-stream {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(transparent, rgba(0, 0, 0, 0.95));
    padding: var(--controls-padding-top) var(--controls-padding-h) var(--controls-padding-bottom);
    z-index: 11;
    transition: opacity 0.4s ease;
}

.hide-ui-stream {
    opacity: 0;
    cursor: none;
}

/* Progress bar */
.progress-area-stream {
    height: 4px;
    width: 100%;
    background: rgba(255, 255, 255, 0.2);
    margin: 0 auto var(--progress-margin-bottom);
    cursor: pointer;
    border-radius: 10px;
    position: relative;
    transition: height 0.15s ease;
}

.progress-area-stream:hover,
.progress-area-stream:active {
    height: 7px;
}

.progress-filled-stream {
    height: 100%;
    width: 0%;
    background: var(--brand-red);
    border-radius: 10px;
    position: relative;
    pointer-events: none;
}

.progress-filled-stream::after {
    content: "";
    position: absolute;
    right: -5px;
    top: 50%;
    transform: translateY(-50%);
    height: clamp(10px, 2vw, 14px);
    width: clamp(10px, 2vw, 14px);
    background: var(--brand-red);
    border-radius: 50%;
    display: none;
}

.progress-area-stream:hover .progress-filled-stream::after {
    display: block;
}

/* Controls row */
.controls-main-stream {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 4px;
}

.controls-left-stream,
.controls-right-stream {
    display: flex;
    align-items: center;
    gap: clamp(2px, 0.8vw, 8px);
    flex-shrink: 0;
}

.btn-icon-stream {
    background: none;
    border: none;
    color: #fff;
    font-size: var(--ctrl-icon-size);
    cursor: pointer;
    transition: color 0.2s, transform 0.15s;
    padding: var(--ctrl-padding);
    min-width: 36px;
    min-height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
}

.btn-icon-stream i {
    font-size: inherit;
}

.btn-icon-stream:hover { color: var(--brand-red); }
.btn-icon-stream:active { transform: scale(0.9); }

.time-stamp-stream {
    font-size: var(--timestamp-size);
    margin-left: clamp(4px, 1vw, 15px);
    color: #ddd;
    font-family: monospace;
    white-space: nowrap;
}

/* Settings panel */
.video-settings-card {
    position: absolute;
    display: none;
    width: var(--settings-width);
    max-height: min(400px, 55vh);
    bottom: var(--settings-bottom);
    right: var(--controls-padding-h);
    z-index: 999;
    background: rgba(26, 26, 26, 0.97);
    backdrop-filter: blur(12px);
    color: #ffffff;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
    border: 1px solid rgba(255, 255, 255, 0.1);
}

.settings-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: clamp(8px, 1.5vh, 13px) clamp(10px, 2vw, 15px);
    background: rgba(0, 0, 0, 0.8);
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
}

.nav-icons {
    display: flex;
    gap: clamp(8px, 2vw, 15px);
}

.nav-icons .icon-btn {
    background: none;
    border: none;
    color: #888;
    font-size: clamp(14px, 2.5vw, 18px);
    cursor: pointer;
    padding: 5px;
    transition: color 0.2s;
    min-width: 32px;
    min-height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.nav-icons .icon-btn.active { color: var(--brand-red); }

.close-btn {
    background: none;
    border: none;
    color: white;
    font-size: clamp(18px, 3vw, 24px);
    cursor: pointer;
    padding: 0 5px;
    min-width: 32px;
    min-height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
}

#wrap-video-setting {
    max-height: min(320px, 45vh);
    overflow-y: auto;
    padding: clamp(6px, 1vh, 10px);
    -webkit-overflow-scrolling: touch;
}

.settings-list {
    list-style: none;
    margin: 0;
    padding: 0;
}

.setting-item {
    padding: clamp(8px, 1.5vh, 12px) clamp(10px, 2vw, 15px);
    cursor: pointer;
    transition: background 0.2s;
    border-radius: 4px;
    margin: 2px 0;
    font-size: clamp(12px, 1.8vw, 15px);
}

.setting-item:hover,
.setting-item:active {
    background: rgba(229, 9, 20, 0.2);
}

.setting-item.active {
    color: var(--brand-red);
    background: rgba(229, 9, 20, 0.15);
}

/* Loader */
.video-loader-stream {
    position: absolute;
    z-index: 12;
    display: none;
    font-size: clamp(28px, 6vw, 40px);
    color: #fff;
    text-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
}

.loading-active-stream .video-main-stream {
    filter: brightness(0.7);
}

/* Skip feedback animation */
.skip-feedback {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0, 0, 0, 0.8);
    padding: clamp(12px, 2.5vh, 22px) clamp(16px, 3.5vw, 30px);
    border-radius: 8px;
    display: flex;
    align-items: center;
    gap: clamp(8px, 2vw, 15px);
    z-index: 20;
    animation: fadeOut 0.6s ease forwards;
    pointer-events: none;
}

.skip-feedback i {
    font-size: clamp(24px, 5vw, 40px);
    color: var(--brand-red);
}

.skip-feedback span {
    font-size: clamp(16px, 3.5vw, 24px);
    font-weight: bold;
}

@keyframes fadeOut {
    0%   { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1.2); }
}

/* Landscape phone optimization */
@media (max-height: 420px) and (orientation: landscape) {
    .controls-wrapper-stream {
        padding-top: 10px;
        padding-bottom: 8px;
    }
    .progress-area-stream {
        margin-bottom: 6px;
    }
    .center-overlay-stream {
        width: 42px;
        height: 42px;
    }
    .center-overlay-stream i {
        font-size: 18px;
    }
    .video-settings-card {
        max-height: 70vh;
        bottom: 50px;
    }
}

/* Very small screens */
@media (max-width: 360px) {
    .time-stamp-stream {
        display: none;
    }
    .btn-icon-stream {
        min-width: 30px;
        padding: 4px;
    }
}

/* Touch device hover fixes */
@media (hover: none) {
    .progress-area-stream:hover { height: 4px; }
    .btn-icon-stream:hover { color: white; }
    .center-overlay-stream:hover { transform: none; background: rgba(0, 0, 0, 0.6); }
    .setting-item:hover { background: none; }
}

/* Settings panel scrollbar */
#wrap-video-setting::-webkit-scrollbar {
    width: 4px;
}
#wrap-video-setting::-webkit-scrollbar-track {
    background: transparent;
}
#wrap-video-setting::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.2);
    border-radius: 4px;
}

/* Meta bar styling */
.meta-bar-stream {
    display: flex;
    justify-content: space-between;
    padding: 15px 25px;
    background-color: #1a1a1a;
}

.meta-bar-stream i { 
    color: #8a96a3; 
    font-size: 1.2rem; 
    cursor: pointer; 
}

/* ============================================ */
/* ORIGINAL STYLES (preserved)                  */
/* ============================================ */

.video-card {
    width: 95%;
    max-width: 1200px;
    margin: 40px auto 0;
    background-color: #1a1a1a;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8);
}

.video-container {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    background-color: black;
    display: flex;
    justify-content: center;
    align-items: center;
}

video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.play-overlay {
    position: absolute;
    z-index: 2;
    cursor: pointer;
}

.play-circle {
    width: 50px;
    height: 50px;
    background: rgba(0, 0, 0, 0.0);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
}

.play-circle i {
    color: white;
    font-size: 1.5rem;
    padding-left: 5px;
}

.controls-bar {
    display: flex;
    justify-content: space-between;
    padding: 20px 30px;
}

.left-controls, .right-controls {
    display: flex;
    gap: 25px;
}

.controls-bar i {
    color: var(--icon-color);
    font-size: 1.3rem;
    cursor: pointer;
}

@media (max-width: 600px) {
    .controls-bar { padding: 15px; gap: 15px; }
    .play-circle { width: 50px; height: 50px; }
    .browse-btn span { display: none; }
}

#title {
    position: relative;
    margin-left: 30px;
    margin-top: 20px;
}

#player {
    width: 100%;
    height: 100%;
    border: none;
}

i:hover {
    color: whitesmoke;
}

.server-section {
    text-align: center;
    margin: 30px auto;
    color: #e0e0e0;
    max-width: 500px;
}

.server-hint {
    font-size: 14px;
    margin-bottom: 20px;
    font-weight: 300;
    opacity: 0.9;
}

.server-switcher {
    display: inline-flex;
    background-color: #555;
    border-radius: 50px;
    overflow: hidden;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

.server-btn {
    border: none;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 30px;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s ease;
    background-color: transparent;
    color: white;
}

#responsive-ui {
    display: flex;
    flex-direction: column;
}

@media(min-width: 500px) {
    #responsive-ui {
        display: flex;
        flex-direction: row;
    }
}

[data-server="active"] {
    background-color: white;
    color: #333;
}

[data-server="active"] i {
    color: #ff4d4d;
}

.server-btn i {
    font-size: 1.1rem;
}

.server-btn:active {
    background-color: #666;
}

#movieResult {
    position: absolute;
    background: #1a1a1a;
    border: 1px solid rgba(255, 255, 255, 0.1);
    width: 350px;
    max-height: 400px;
    top: 110px;
    justify-self: center;
    border-radius: 16px;
    overflow-y: auto;
    overflow-x: hidden;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    z-index: 100;
    margin-top: 10px;
    display: none;
}

.movie-card {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px 16px;
    cursor: pointer;
    transition: background 0.2s ease;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
}

.movie-card:hover {
    background: rgba(255, 255, 255, 0.05);
}

.movie-poster {
    width: 50px;
    height: 70px;
    border-radius: 8px;
    object-fit: cover;
    background: #333;
}

.movie-details {
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.movie-meta {
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #888;
    font-size: 0.7rem;
    font-weight: 600;
    margin-bottom: 4px;
}

.movie-title {
    color: #ffffff;
    font-size: 0.95rem;
    font-weight: 500;
    margin: 0;
    line-height: 1.3;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

#movieResult::-webkit-scrollbar {
    width: 6px;
}

#movieResult::-webkit-scrollbar-thumb {
    background: #444;
    border-radius: 10px;
}

.search-container {
    background: var(--input-bg);
    border: 1px solid var(--text-muted);
    border-radius: 8px;
    padding: 12px 20px;
    display: flex;
    justify-self: center;
    justify-content: center;
    margin-bottom: 50px;
}

.search-container input {
    background: transparent;
    border: none;
    color: white;
    padding-left: 15px;
    width: 100%;
    font-size: 1rem;
}

.search-container input:focus { outline: none; }

.filter-btn {
    background: transparent;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 0.9rem;
    display: flex;
    align-items: center;
    gap: 8px;
}

#searchContainer {
    position: fixed;
    z-index: 999;
    border: 0px solid black;
    top: 20px;
    padding-top: 30px;
    width: 100%;
    display: none;
    justify-content: center;
    justify-self: center;
}

.info_movie-card {
    background-color: #1a232e;
    width: 85%;
    max-width: 450px;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    margin-left: 15px;
    margin-top: 40px;
    padding: 16px;
}

.header { padding: 20px 20px 10px; }

.info_h1 {
    color: #fff;
    margin: 0 0 10px 0;
    font-size: 1.8rem;
    font-weight: 500;
}

.badges { display: flex; gap: 8px; }

.badge {
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.85rem;
    font-weight: bold;
    color: white;
    border: 1px solid #4a5568;
}

.imdb { background: #000; color: #f5c518; border-color: #f5c518; }
.fab.fa-imdb { margin-right: 4px; }

.description {
    padding: 0 20px;
    line-height: 1.6;
    font-size: 0.95rem;
    margin-bottom: 20px;
}

.divider {
    border: 0;
    border-top: 1px dotted #4a5568;
    margin: 0 20px;
}

.content-wrapper {
    display: flex;
    padding: 20px;
    gap: 15px;
}

.details { flex: 2; font-size: 0.9rem; }
.details p { margin: 6px 0; line-height: 1.4; }
.details span { color: #fff; }

.poster-container {
    flex: 1;
    background-color: #2d3748;
    border-radius: 8px;
    height: 180px;
    overflow: hidden;
}

.poster-img { width: 100%; height: 100%; object-fit: cover; }

.rating-footer {
    background: linear-gradient(to right, #b30000, #ff4d4d);
    padding: 10px;
    font-size: 16px;
    text-align: center;
    color: #fff;
    border-radius: 5px;
}

.stars { font-size: 1.4rem; margin-bottom: 5px; }
.stars .yellow { color: #ecc94b; }
.stars .gray { color: #4a5568; }
.rating-text { font-size: 0.9rem; }

.section-title-liked {
    margin-top: 40px;
    font-size: 1.5rem;
    font-weight: 400;
    margin-bottom: 20px;
    text-align: center;
}

a {
    color: inherit;
    text-decoration: none;
}

.scroll-wrapper {
    padding: 10px;
    display: flex;
    gap: 16px;
    overflow-x: auto;
    padding-bottom: 10px;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
}

.scroll-wrapper::-webkit-scrollbar {
    display: none;
}

.movie-card-liked {
    min-width: 180px;
    max-width: 180px;
    flex-shrink: 0;
}

.img-container-liked {
    position: relative;
    width: 100%;
    aspect-ratio: 2 / 3;
    background-color: #2d3748;
    border-radius: 16px;
    overflow: hidden;
}

.poster-liked {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.hd-badge {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(0, 0, 0, 0.5);
    color: white;
    font-size: 0.7rem;
    font-weight: bold;
    font-style: italic;
    padding: 2px 6px;
    border-radius: 4px;
    backdrop-filter: blur(4px);
}

.movie-info-liked {
    margin-top: 12px;
}

.meta-liked {
    font-size: 0.75rem;
    color: #94a3b8;
    margin: 0 0 6px 0;
}

.movie-title-liked {
    font-size: 1rem;
    font-weight: 500;
    margin: 0;
    line-height: 1.3;
}

.loader, .loader_before {
    font-size: 40px;
    color: #db1620;
    text-align: center;
    top: 200px;
    left: 50%;
    transform: translateX(-50%);
    position: absolute;
    z-index: 999;
}

.loader, .loader_before i {
    animation: spin 1s linear infinite;
}

@keyframes spin {

<body>

<nav class="navbar">
    <div class="nav-left">
        <a href="/home" class="browse-btn">
            <i class="fa-solid fa-play"></i>
            <b>Browse</b>
        </a>
    </div>

    <div class="nav-center">
        <img src="/IMG/logo_m.png" alt="Logo" class="nav-logo">
    </div>

    <div class="nav-right">
        <button class="icon-btn search-btn" id="search-b">
            <i class="fa-solid fa-magnifying-glass"></i>
        </button>
        <div class="profile-icon">
            <i class="fa-solid fa-face-smile"></i>
        </div>
    </div>
</nav>
<div id="searchContainer">
    <div class="search-container">
        <i class="fas fa-search"></i>
        <input type="text" placeholder="Search for movies, actors, or genres..." id="search" autocomplete="off">
    </div>
</div>

<div id="movieResult"></div>
<div class="loader_before"></div>
<script type="module">
import {auth} from "/JS/auth.js"
    auth(document.querySelector(".profile-icon"))
 const loaders = document.querySelector(".loader_before")
    import { fetchmovie } from "/JS/fetchMovie.js";
    import { movie } from "/UI/searchBar.js";
    
    movie.search();
    await fetchmovie.fetchWorker();
   loaders.style.display="none"
    let bodyClickListener = null;

    document.querySelector("#search-b").addEventListener("click", (e) => {
        e.stopPropagation();

        const searchBody = document.getElementById("searchContainer");
        const displayBar = document.getElementById("movieResult");
        
        searchBody.style.display = "grid";
        displayBar.style.display = "block";
        
        if (bodyClickListener) {
            document.removeEventListener("click", bodyClickListener);
        }
        
        bodyClickListener = (event) => {
            const searchContainer = document.getElementById("searchContainer");
            const movieResult = document.getElementById("movieResult");
            const searchButton = document.querySelector("#search-b");
            
            if (!searchContainer.contains(event.target) && 
                !movieResult.contains(event.target) && 
                !searchButton.contains(event.target)) {
                
                searchContainer.style.display = "none";
                movieResult.style.display = "none";
                
                document.removeEventListener("click", bodyClickListener);
                bodyClickListener = null;
            }
        };
        
        document.addEventListener("click", bodyClickListener);
    });
</script>

</body>
