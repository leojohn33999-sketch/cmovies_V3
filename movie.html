<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

   <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <style>
  :root {
        --brand-red: #e50914;
        --bg-dark: #141414;
        --control-bg: #252a34;
        --icon-color: #8a96a3;
        --highlight-blue: #ff4d4d;

    --bg-black: #0F0F0F;
    --surface-grey: #1A1A1A;
    --text-white: #FFFFFF;
    --text-muted: #A0A0A0;
    --input-bg: #141414;
--accent-gradient: linear-gradient(180deg, #ff4d4d 0%, #b30000 100%);
    }

    body {
        background-color: #1a1a1a;
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        color: white;
    }

    /* --- Navbar Styling --- */
    .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 5%;
        
    }

    .browse-btn {
        display: flex;
        align-items: center;
        background: linear-gradient(180deg, #ff4d4d 0%, #b30000 100%);
        color: white;
        text-decoration: none;
        padding: 8px 20px;
        border-radius: 50px;
        font-weight: 600;
        font-size: 14px;
        gap: 8px;
    }

    .nav-logo {
        height: 40px;
        width: auto;
          
  backdrop-filter: blur(2px);
    }

    .nav-right {
        display: flex;
        align-items: center;
        gap: 20px;
    }

    .icon-btn {
        background: none;
        border: none;
        color: white;
        font-size: 1.2rem;
        cursor: pointer;
    }

    .profile-icon {
        width: 35px;
        height: 35px;
        background: linear-gradient(to bottom, #ff4d4d, #b30000);
        border-radius: 6px;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* --- Video Player Styling --- */
    .video-card {
        width: 95%;
            max-width: 900px;
            margin: 40px auto 0;
            background-color: #1a1a1a;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8);
     }

    .video-container {
        position: relative;
        width: 100%;
        /* Standard Movie Aspect Ratio (16:9) */
        aspect-ratio: 16 / 9; 
        background-color: black;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    video {
        width: 100%;
        height: 100%;
        object-fit: cover; /* Ensures video fills the fixed area without gaps */
    }

    .play-overlay {
        position: absolute;
        z-index: 2;
        cursor: pointer;
    }

    .play-circle {
        width: 70px;
        height: 70px;
        background: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .play-circle i {
        color: white;
        font-size: 1.8rem;
        padding-left: 5px;
    }

    /* --- Control Bar --- */
    .controls-bar {
        display: flex;
        justify-content: space-between;
        padding: 20px 30px;
    }

    .left-controls, .right-controls {
        display: flex;
        gap: 25px;
    }

    .controls-bar i {
        color: var(--icon-color);
        font-size: 1.3rem;
        cursor: pointer;
    }

   

    /* Responsive Adjustments */
    @media (max-width: 600px) {
        .controls-bar { padding: 15px; gap: 15px; }
        .play-circle { width: 50px; height: 50px; }
        .browse-btn span { display: none; } /* Hide text on mobile */
    }
   #title{
       position: relative;
       margin-left: 30px;
       margin-top: 20px;
       
   }
    #player{
       width: 100%;
       height: 100%;
       border: none;
   }
   i:hover{
       color: #ff4d4d;
   }
   .server-section {
    text-align: center;
    margin: 30px auto;
    color: #e0e0e0;
    max-width: 500px;
}

.server-hint {
    font-size: 14px;
    margin-bottom: 20px;
    font-weight: 300;
    opacity: 0.9;
}

/* Container for the buttons */
.server-switcher {
    display: inline-flex;
    background-color: #555; /* Dark grey side */
    border-radius: 50px;
    overflow: hidden;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

.server-btn {
    border: none;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 30px;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s ease;
    background-color: transparent;
    color: white;
}

/* Make sure your CSS matches the attribute being set */
[data-server="active"] {
    background-color: white;
    color: #333;
}

/* Blue Cloud Icon for active state */
[data-server="active"] i {
    color: #ff4d4d;
}

/* Inactive Cloud Icon */
.server-btn i {
    font-size: 1.1rem;
}

.server-btn:active {
    background-color: #666;
}
#movieResult {
    position: absolute;
    background: #1a1a1a; /* Dark surface */
    border: 1px solid rgba(255, 255, 255, 0.1);
    width: 350px;
    max-height: 400px; /* Use max-height instead of fixed height */
    top: 110px;
    justify-self: center;
    border-radius: 16px;
    overflow-y: auto;
    overflow-x: hidden;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); /* Adds depth */
    z-index: 100;
    margin-top: 10px;
    display: none;
}

/* Individual Movie Row */
.movie-card {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px 16px;
    cursor: pointer;
    transition: background 0.2s ease;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
}

.movie-card:hover {
    background: rgba(255, 255, 255, 0.05); /* Subtle highlight */
}

/* Poster Image */
.movie-poster {
    width: 50px;
    height: 70px;
    border-radius: 8px;
    object-fit: cover; /* Ensures image isn't distorted */
    background: #333; /* Placeholder color while loading */
}

/* Text Container */
.movie-details {
    display: flex;
    flex-direction: column;
    justify-content: center;
}

/* Meta Info (Type & Year) */
.movie-meta {
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #888;
    font-size: 0.7rem;
    font-weight: 600;
    margin-bottom: 4px;
}

/* Movie Title */
.movie-title {
    color: #ffffff;
    font-size: 0.95rem;
    font-weight: 500;
    margin: 0;
    line-height: 1.3;
    /* Truncate long titles with ellipsis (...) */
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

/* Custom Scrollbar for a "Pro" look */
#movieResult::-webkit-scrollbar {
    width: 6px;
}
#movieResult::-webkit-scrollbar-thumb {
    background: #444;
    border-radius: 10px;
}

<body>

<nav class="navbar">
    <div class="nav-left">
        <a href="/home" class="browse-btn">
            <i class="fa-solid fa-play"></i>
            <b>Browse</b>
        </a>
    </div>

    <div class="nav-center">
        <img src="/IMG/logo_m.png" alt="Logo" class="nav-logo">
    </div>

    <div class="nav-right">
        <button class="icon-btn search-btn" id="search-b">
            <i class="fa-solid fa-magnifying-glass"></i>
        </button>
        <div class="profile-icon">
            <i class="fa-solid fa-face-smile"></i>
        </div>
    </div>
</nav>
<div id="searchContainer">
    <div class="search-container">
        <i class="fas fa-search"></i>
        <input type="text" placeholder="Search for movies, actors, or genres..." id="search" autocomplete="off">
    </div>
</div>

<div id="movieResult"></div>
<div class="loader_before"></div>
<script type="module">
import {auth} from "/JS/auth.js"
    auth(document.querySelector(".profile-icon"))
 const loaders = document.querySelector(".loader_before")
    import { fetchmovie } from "/JS/fetchMovie.js";
    import { movie } from "/UI/searchBar.js";
    
    movie.search();
    await fetchmovie.fetchWorker();
   loaders.style.display="none"
    let bodyClickListener = null;

    document.querySelector("#search-b").addEventListener("click", (e) => {
        // --- KEY FIX START ---
        e.stopPropagation(); // Prevents the body listener from firing immediately
        // --- KEY FIX END ---

        const searchBody = document.getElementById("searchContainer");
        const displayBar = document.getElementById("movieResult");
        
        searchBody.style.display = "grid";
        displayBar.style.display = "block";
        
        if (bodyClickListener) {
            document.removeEventListener("click", bodyClickListener);
        }
        
        bodyClickListener = (event) => {
            const searchContainer = document.getElementById("searchContainer");
            const movieResult = document.getElementById("movieResult");
            const searchButton = document.querySelector("#search-b");
            
            // If the click is NOT inside the search box AND NOT inside the results AND NOT the button
            if (!searchContainer.contains(event.target) && 
                !movieResult.contains(event.target) && 
                !searchButton.contains(event.target)) {
                
                searchContainer.style.display = "none";
                movieResult.style.display = "none";
                
                document.removeEventListener("click", bodyClickListener);
                bodyClickListener = null;
            }
        };
        
        // Use document instead of document.body for better coverage
        document.addEventListener("click", bodyClickListener);
    });
    
    
    
</script>
